version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-search-mcp:
    build: ./mcp_servers/web_search
    ports:
      - "8001:8001"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  arxiv-mcp:
    build: ./mcp_servers/arxiv
    ports:
      - "8002:8002"
    environment:
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  github-mcp:
    build: ./mcp_servers/github
    ports:
      - "8003:8003"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
