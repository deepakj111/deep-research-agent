services:
  web-search-mcp:
    build: ./mcp_servers/web_search
    ports:
      - "8001:8001"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  arxiv-mcp:
    build: ./mcp_servers/arxiv
    ports:
      - "8002:8002"
    environment:
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  github-mcp:
    build: ./mcp_servers/github
    ports:
      - "8003:8003"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=deep-research-agent
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WEB_SEARCH_MCP_URL=http://web-search-mcp:8001/sse
      - ARXIV_MCP_URL=http://arxiv-mcp:8002/sse
      - GITHUB_MCP_URL=http://github-mcp:8003/sse
    depends_on:
      web-search-mcp:
        condition: service_healthy
      arxiv-mcp:
        condition: service_healthy
      github-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  streamlit:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - AGENT_API_URL=http://agent:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
