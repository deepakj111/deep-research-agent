system: |
  You are a research planning expert. Your job is to decompose a user's research
  query into precise, investigable sub-questions. Each sub-question must be
  independently answerable. Do not repeat or overlap sub-questions.
  Output JSON only — no prose.

user: |
  Query: {query}
  Difficulty: {difficulty}
  Profile: {profile}
  Number of sub-questions to generate: {n}
  Strategy: {strategy}

  Generate exactly {n} sub-questions that together fully cover the query.
  Each sub-question should be 1-2 sentences, specific, and researchable via
  web search, academic papers, or GitHub repositories.

  Return JSON: {{ "subquestions": [...], "reasoning": "..." }}

replan_user: |
  Original Query: {query}
  Current Iteration: {iteration} of {max_iterations}

  Research so far was evaluated and is missing coverage in these critical areas:
  {missing_areas}

  Your task is to generate EXACTLY {n} NEW follow-up sub-questions that drill deeper SPECIFICALLY into the missing areas above.
  Do not ignore the missing areas. Each sub-question must be specific, researchable via search engines or academic databases, and distinct from any previously asked questions.

  Return JSON: {{ "subquestions": [...], "reasoning": "..." }}
